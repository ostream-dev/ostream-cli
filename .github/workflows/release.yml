name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for changelogs

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          # Default token is scoped to THIS repo; goreleaser uses it for
          # creating the GitHub release and uploading assets. Writing the
          # Homebrew formula to a different repo needs a PAT with write
          # access to ostream-dev/homebrew-tap, stored as the below secret.
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
