name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for changelogs

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          # Default GITHUB_TOKEN authorizes the release on this repo.
          # The PAT (with write access to homebrew-tap) is picked up by
          # .goreleaser.yaml's brews.repository.token template and used
          # only for pushing the Formula — it needs no access here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
